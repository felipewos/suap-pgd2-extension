<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="options.css" />
  <title>SUAP PGD2 PIT/RIT - Licença</title>
</head>
<body>
  <div class="wrap">
    <h1>Configurações — SUAP PGD2 PIT/RIT</h1>

    <!-- LICENÇA (MIGRADA DO POPUP) -->
    <section class="card">
      <h2>Licença</h2>

      <div class="hint">
        Cole aqui sua chave de licença. Ela será salva para o usuário atual detectado no SUAP.
      </div>

      <div class="actions">
        <input id="licenseKey" type="text" placeholder="Chave de licença (ex.: ABCD1234...)" />
        <button id="btnActivate" class="btn primary">Ativar</button>
        <button id="btnClear" class="btn danger">Limpar</button>
      </div>

      <div class="hint" id="serverHint"></div>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
